<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Southwark Development Decision Engine v3</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="wrap">

    <h1>Southwark Development Decision Engine v3</h1>

    <!-- INPUT -->
    <div class="card">
      <h2>Site Inputs</h2>

      <input id="address" placeholder="Site address" value="55 Nigel Road, SE15" />
      <input id="area" type="number" value="0.391" />
      
      <select id="unit">
        <option value="acres">Acres</option>
        <option value="ha">Hectares</option>
      </select>

      <select id="context">
        <option value="urban">Urban</option>
        <option value="town">Town Centre</option>
        <option value="suburban">Suburban</option>
      </select>

      <select id="ptal">
        <option value="medium">Medium PTAL</option>
        <option value="high">High PTAL</option>
        <option value="very-high">Very High PTAL</option>
      </select>

      <button onclick="runAll()">Run Analysis</button>
    </div>

    <!-- METRICS -->
    <div class="card">
      <h2>Key Outputs</h2>

      <p><strong>Height:</strong> <span id="heightValue"></span></p>
      <p><strong>Density:</strong> <span id="densityValue"></span></p>
      <p><strong>Homes:</strong> <span id="homesValue"></span></p>
      <p><strong>Parking:</strong> <span id="parkingValue"></span></p>
      <p><strong>Land Value:</strong> <span id="rlvValue"></span></p>
    </div>

    <!-- EXPLAINERS -->
    <div class="card">
      <h2>Why these recommendations?</h2>

      <h3>Density</h3>
      <p id="densityWhy"></p>

      <h3>Parking</h3>
      <p id="parkingWhy"></p>

      <h3>Affordable Housing</h3>
      <p id="affordableWhy"></p>
    </div>

    <!-- EXTRA METRICS -->
    <div class="card">
      <h2>Key Planning Considerations</h2>
      <ul id="extraMetrics"></ul>
    </div>

    <!-- COMPARABLES -->
    <div class="card">
      <h2>Comparable Applications</h2>
      <div id="comparables"></div>
    </div>

  </div>

  <script src="/app.js"></script>
</body>
</html>
